<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Videre Evidence Operations Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Evidence Operations</h1>
      <p>OLTP intake to OLAP reporting simulation</p>
    </div>
    <div class="login">
      <label for="role">Stakeholder access</label>
      <select id="role">
        <option value="leadership">Leadership</option>
        <option value="investigations">Investigations</option>
        <option value="legal">Legal</option>
        <option value="partners">CSO Partners</option>
        <option value="data_protection">Data Protection</option>
        <option value="ai">AI Review</option>
        <option value="media">Media Store</option>
        <option value="monitoring">Monitoring</option>
      </select>
      <input id="password" type="password" value="demo" aria-label="Password">
      <button id="login">Open</button>
    </div>
  </header>

  <main>
    <section class="kpis" id="kpis"></section>
    <section class="filters" id="filters">
      <input id="search" type="search" placeholder="Search file, incident, source">
      <select id="incident-filter"><option value="">All incidents</option></select>
      <select id="type-filter"><option value="">All media types</option></select>
      <select id="verification-filter"><option value="">All verification states</option></select>
      <select id="legal-filter"><option value="">All legal states</option></select>
      <select id="access-filter"><option value="">All access classes</option></select>
      <select id="safety-filter"><option value="">All safety states</option></select>
      <button id="clear-filters">Clear</button>
    </section>
    <section class="visual-grid">
      <div class="panel chart-panel">
        <h2>Media Mix</h2>
        <canvas id="media-chart" width="320" height="220"></canvas>
      </div>
      <div class="panel chart-panel">
        <h2>Verification</h2>
        <canvas id="verification-chart" width="320" height="220"></canvas>
      </div>
      <div class="panel chart-panel">
        <h2>Risk Heatmap</h2>
        <div id="heatmap" class="heatmap"></div>
      </div>
    </section>
    <section class="panel">
      <div class="panel-head">
        <div>
          <h2 id="view-title">Leadership</h2>
          <p id="view-note"></p>
        </div>
        <span id="updated">Waiting for data</span>
      </div>
      <div id="content"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
