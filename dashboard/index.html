<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HRT Evidence Operations Dashboard</title>
  <link rel="stylesheet" href="/dashboard/styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Evidence Operations</h1>
      <p>OLTP intake to OLAP reporting simulation</p>
    </div>
    <div class="login">
      <label for="role">Stakeholder access</label>
      <select id="role">
        <option value="leadership">Leadership</option>
        <option value="investigations">Investigations</option>
        <option value="legal">Legal</option>
        <option value="partners">CSO Partners</option>
        <option value="data_protection">Data Protection</option>
        <option value="ai">AI Review</option>
        <option value="media">Media Store</option>
        <option value="monitoring">Monitoring</option>
      </select>
      <input id="password" type="password" value="demo" aria-label="Password">
      <button id="login">Open</button>
    </div>
  </header>

  <main>
    <nav class="role-nav" aria-label="Stakeholder dashboards">
      <button class="role-button active" data-role="leadership"><strong>Leadership</strong><span>KPIs and strategic risk</span></button>
      <button class="role-button" data-role="investigations"><strong>Investigations</strong><span>Operational queues and filters</span></button>
      <button class="role-button" data-role="legal"><strong>Legal</strong><span>Evidence readiness and actions</span></button>
      <button class="role-button" data-role="partners"><strong>CSO Partners</strong><span>Masked shared trends</span></button>
      <button class="role-button" data-role="data_protection"><strong>Data Protection</strong><span>Restricted records and compliance</span></button>
      <button class="role-button" data-role="ai"><strong>AI Review</strong><span>HITL quality assurance</span></button>
      <button class="role-button" data-role="media"><strong>Media Store</strong><span>NoSQL catalog and previews</span></button>
      <button class="role-button" data-role="monitoring"><strong>Monitoring</strong><span>Alerts, skew, performance</span></button>
    </nav>
    <section class="panel">
      <div class="panel-head">
        <div>
          <h2 id="view-title">Leadership</h2>
          <p id="view-note"></p>
        </div>
        <span id="updated">Waiting for data</span>
      </div>
      <section class="support-region" id="support-region">
        <section class="kpis" id="kpis"></section>
        <section class="filters" id="filters">
          <input id="search" type="search" placeholder="Search file, incident, source">
          <select id="incident-filter"><option value="">All incidents</option></select>
          <select id="type-filter"><option value="">All media types</option></select>
          <select id="verification-filter"><option value="">All verification states</option></select>
          <select id="legal-filter"><option value="">All legal states</option></select>
          <select id="access-filter"><option value="">All access classes</option></select>
          <select id="safety-filter"><option value="">All safety states</option></select>
          <button id="clear-filters">Clear</button>
        </section>
        <section class="visual-grid" id="visual-grid">
          <div class="chart-panel">
            <h2>Media Mix</h2>
            <canvas id="media-chart" width="320" height="220"></canvas>
          </div>
          <div class="chart-panel">
            <h2>Verification</h2>
            <canvas id="verification-chart" width="320" height="220"></canvas>
          </div>
        </section>
      </section>
      <div id="content"></div>
    </section>
  </main>

  <script src="/dashboard/app.js"></script>
</body>
</html>
